name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Typecheck + Tests
    runs-on: ubuntu-latest
    env:
      # Dummy: prisma generate y los tests unitarios no conectan a la BD
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

  lint:
    name: Lint (no bloqueante)
    runs-on: ubuntu-latest
    # TODO: volver bloqueante cuando se limpien los errores preexistentes
    # (unused imports + any en partidos/usuarios/match-dialog, ver TODO.md A8)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: ESLint
        run: npx eslint app components lib modules
